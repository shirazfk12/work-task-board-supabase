<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Work Task Board</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="app-header">
    <div>
      <h1>Work Tasks</h1>
    </div>
    <div class="header-actions">
      <button id="openTaskFormBtn">Add task</button>
      <button id="exportJsonBtn" class="secondary">Export JSON</button>
      <label class="secondary file-label">
        Import JSON
        <input id="importJsonInput" type="file" accept="application/json" />
      </label>
      <button id="clearCompletedBtn" class="danger">Clear done</button>
    </div>
  </header>

  <main class="layout">
    <section id="formPanel" class="panel form-panel is-hidden" aria-hidden="true">
      <div class="panel-title-row">
        <h2 id="formTitle">Add Task</h2>
        <button id="closeTaskFormBtn" class="icon-button secondary" type="button" aria-label="Close task form">x</button>
      </div>
      <form id="taskForm">
        <input id="taskId" type="hidden" />

        <label>
          Task
          <input id="title" name="title" type="text" placeholder="Prepare weekly ops update" required />
        </label>

        <div class="grid-two">
          <label>
            Team
            <select id="teamSelect" name="team">
              <option>Admin</option>
              <option>Client Success</option>
              <option>Data Science</option>
              <option>Hamid</option>
              <option>IT</option>
              <option>Product</option>
              <option>Suhail</option>
              <option value="__add__">Add team</option>
            </select>
            <input id="teamCustom" class="is-hidden" type="text" placeholder="New team" />
          </label>
          <label>
            POC
            <input id="poc" name="poc" type="text" placeholder="Jane Doe" />
          </label>
        </div>

        <div class="grid-two">
          <label>
            Priority
            <select id="priority" name="priority">
              <option>High</option>
              <option selected>Medium</option>
              <option>Low</option>
            </select>
          </label>
          <label>
            Due date
            <span class="date-field-shell" onpointerdown="openFormDate(event)">
              <input id="dueDate" name="dueDate" type="date" />
            </span>
          </label>
        </div>

        <label>
          Notes
          <textarea id="notes" name="notes" rows="4" placeholder="Relevant links, context, next steps..."></textarea>
        </label>

        <div class="form-actions">
          <button type="submit" id="saveBtn">Save task</button>
          <button type="button" id="resetBtn" class="secondary">Reset</button>
        </div>
      </form>
    </section>

    <section class="panel board-panel">
      <div class="toolbar">
        <input id="searchInput" type="search" placeholder="Search tasks, teams, POCs, notes..." />
        <select id="teamFilter">
          <option value="">All teams</option>
        </select>
        <select id="priorityFilter">
          <option value="">All priorities</option>
          <option>High</option>
          <option>Medium</option>
          <option>Low</option>
        </select>
      </div>

      <div id="board" class="task-spaces" aria-live="polite"></div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
